# ─────────────────────────────────────────────────────
#  DEVELOPMENT
#  Структура рядом с этой папкой:
#    ../archivdin-backend/
#    ../archivdin-frontend/
#    ../archivdin-test-data/    ← https://github.com/Manas-DE-Archieve/test_data
#
#  Запуск: docker compose up
# ─────────────────────────────────────────────────────
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../archivdin-backend/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../archivdin-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/archive
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../archivdin-backend:/app
      - pip_cache:/root/.cache/pip
      # Seed data from separate repo — mounted read-only
      - ../archivdin-test-data/seed.json:/app/seed.json:ro
      - ../archivdin-test-data/documents:/app/test_documents:ro

  frontend:
    build:
      context: ../archivdin-frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ../archivdin-frontend:/app
      - node_modules:/app/node_modules

volumes:
  postgres_data:
  pip_cache:
  node_modules: