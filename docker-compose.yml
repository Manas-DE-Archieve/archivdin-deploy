version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: archivdin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../archivdin-backend/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d archive"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../archivdin-backend
      dockerfile: Dockerfile
    container_name: archivdin-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/archive
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../archivdin-backend:/app
      - pip_cache:/root/.cache/pip
      - ../archivdin-test-data/seed.json:/app/seed.json:ro
      - ../archivdin-test-data/documents:/app/test_documents:ro
    command: >
      sh -c "
      echo 'Waiting for DB...' &&
      sleep 2 &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: ../archivdin-frontend
      dockerfile: Dockerfile.dev
    container_name: archivdin-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ../archivdin-frontend:/app
      - node_modules:/app/node_modules

volumes:
  postgres_data:
  pip_cache:
  node_modules: